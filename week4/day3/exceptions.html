    function divide(a,b) {
      let result
      try {
        if (b === 0) {
          throw new Error('zeroDivision')
        }
        result = a / b
      } catch (e) {
        console.log("Cannot divide by 0")
        console.log(e.message)
      } finally {
        console.log('division complete')
      }
      return result
    }

    console.log(divide(1,2))
    console.log(divide(9,3))
    console.log(divide(5,4))
    console.log(divide(2,0))
  </script>
