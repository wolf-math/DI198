<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON</title>
</head>
<body>

  <h1>JSON</h1>
  
  <script>
    const address = {
      street: 'Evergreen Terrace',
      number: '742',
      city: 'Kalamazoo',
      state: 'MI',
      zip: '49007',
    };

    // converts object to JSON string
    const addressJSON = JSON.stringify(address, null, 2)

    console.log(address)
    console.log(addressJSON)

    console.log(typeof address) // object
    console.log(typeof addressJSON) // string

    // this is a string, not an obj!

</body>
</html>
