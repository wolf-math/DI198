<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reduce</title>
</head>
<body>
  <h1>Exercise Reduce</h1>
  
  <script>
    // Use the reduce() method to sum up all the calories of every desert, except Apple Pie.

    // The output should be 85

    let party = [
      {
        desert: 'Chocolate Mousse',
        calories: 30,
      },
      {
        desert: 'Apple Pie',
        calories: 15,
      },
      {
        desert: 'Croissant',
        calories: 50,
      },
      {
        desert: 'Strawberry Icecream',
        calories: 5,
      },
    ]

    let cals = party.reduce((acc, val) => {
      return val.desert !== 'Apple Pie' ?  acc + val.calories : acc + 0
    }, 0)

    console.log(cals)

  </script>
</body>
</html>
