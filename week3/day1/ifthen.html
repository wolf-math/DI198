<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>conditionals</h1>

  <script>

    let age = prompt("How old are you?")

    if (age < 18) {
      alert ("You are too young to go to the club!")
    } else if (age > 18 && age < 40) {
      alert ("You can go to the club")
    } else {
      alert ("You're a creepy old man")
    }
  </script>
  
</body>
</html>
