<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Promp Confirm</title>
</head>
<body>

  <script>
    alert("Your time is almost up")

    let age = prompt("How old are you?")
    alert(`You are ${age} years old`)

    let like = confirm("I don't like you.")
    alert(like)
  </script>
  
</body>
</html>
