<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switch</title>
</head>
<body>
  <h1>Switch</h1>
  
  <script>
    let age = prompt("How old are you?")

    let userAge = parseInt(age)

    switch(userAge){
      case 10:
        alert("You get a power ranger")
        break
      case 18:
        alert("You get a car")
        break
      default:
        alert("You are not special")
    }

  </script>
</body>
</html>
