<body>
  <script>

    let age = prompt("how old are you?")
    let userAge = parseFloat(age)

    let response
    if (userAge < 18) {
       response = 'Too young'
    } else if (userAge >= 18 && userAge < 40) {
       response = 'Just right'
    } else {
       response = 'too old'
    }

    console.log(response)
  </script>
