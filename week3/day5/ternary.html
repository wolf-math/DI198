<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ternary</title>
</head>
<body>
  <h1>Ternary Operator</h1>

  <script>
    let shoes = 'crocs'

    shoes === "chucks" 
      ? console.log("Your shoes are stylish") 
      : console.log("Your shoes are comfortable")


// Create a function to check the year given by the user

// If the year is after 2000, you should display "You are in the 21st century", else you should display "You live in the Middle Age"

    function checkYear(year) {
      year > 2000 ? console.log("You are in the 21st century") : console.log("You live in the Middle Age")
    }

    checkYear(2026)
    checkYear(1977)
    checkYear(2900)

  </script>
</body>
</html>
